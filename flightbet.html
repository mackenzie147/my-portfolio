<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlightBet — Delay Markets</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080808;--bg2:#0f0f0f;--bg3:#161616;--bg4:#1e1e1e;
  --border:#242424;--border2:#2e2e2e;
  --gold:#f0d060;--gold2:#c4a83a;
  --green:#5dba7e;--red:#e06050;--blue:#5b9cf6;--orange:#e8824a;
  --text:#f0ece0;--text2:#8a8680;--text3:#504e4a;
  --font-board:'Share Tech Mono',monospace;
  --font-ui:'Syne',sans-serif;
  --font-mono:'DM Mono',monospace;
}
:root.light{
  --bg:#f5f2eb;--bg2:#ffffff;--bg3:#f0ece3;--bg4:#e8e4db;
  --border:#ddd9d0;--border2:#c8c4bb;
  --gold:#8a6f00;--gold2:#6b5500;
  --green:#1e7a42;--red:#c0392b;--blue:#1a5fa8;--orange:#c4561a;
  --text:#1a1814;--text2:#5a5650;--text3:#9a9690;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-ui);overflow-x:hidden}
body{display:flex;flex-direction:column}
nav{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:52px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;flex-shrink:0}
.nav-logo{font-family:var(--font-board);font-size:16px;color:var(--gold);letter-spacing:3px}
.nav-logo span{color:var(--text2);font-size:11px;letter-spacing:2px;margin-left:10px}
.nav-right{display:flex;align-items:center;gap:16px}
.nav-airport{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);letter-spacing:1px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 12px;cursor:pointer;transition:border-color .2s}
.nav-airport:hover{border-color:var(--border2)}
.nav-airport .code{font-family:var(--font-board);color:var(--gold);font-size:15px}
.nav-btn{font-family:var(--font-ui);font-size:11px;font-weight:600;letter-spacing:2px;padding:7px 16px;border-radius:5px;cursor:pointer;transition:all .15s;border:1px solid}
.nav-btn.outline{background:transparent;border-color:var(--border2);color:var(--text2)}
.nav-btn.outline:hover{border-color:var(--text2);color:var(--text)}
.nav-btn.primary{background:var(--gold);border-color:var(--gold);color:#080808}
.nav-btn.primary:hover{background:var(--gold2);border-color:var(--gold2)}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer}
.user-pill .avatar{width:22px;height:22px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#080808}
.user-pill .bal{color:var(--green);font-family:var(--font-mono);font-size:11px}
.ticker{background:var(--bg2);border-bottom:1px solid var(--border);height:30px;overflow:hidden;flex-shrink:0}
.ticker-inner{display:flex;align-items:center;height:100%;animation:scroll-ticker 40s linear infinite;white-space:nowrap}
.ticker-item{display:inline-flex;align-items:center;gap:8px;padding:0 24px;font-size:10px;letter-spacing:1px;color:var(--text2);font-family:var(--font-mono);border-right:1px solid var(--border)}
.ticker-item .fid{color:var(--gold)}
.chg-up{color:var(--green)}.chg-dn{color:var(--red)}
@keyframes scroll-ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.main{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar{width:260px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg2);overflow-y:auto;display:flex;flex-direction:column}
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.sidebar-section{padding:16px 16px 8px;border-bottom:1px solid var(--border)}
.sidebar-label{font-size:9px;letter-spacing:2px;color:var(--text3);margin-bottom:10px;text-transform:uppercase}
.filter-chip{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:5px;cursor:pointer;font-size:11px;color:var(--text2);letter-spacing:1px;transition:background .15s,color .15s}
.filter-chip:hover{background:var(--bg3);color:var(--text)}
.filter-chip.active{background:var(--bg3);color:var(--gold);border-left:2px solid var(--gold)}
.filter-chip .count{font-family:var(--font-mono);font-size:10px;background:var(--bg4);padding:1px 6px;border-radius:3px;color:var(--text3)}
.stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)}
.stat-row:last-child{border-bottom:none}
.stat-row .lbl{font-size:10px;color:var(--text2)}
.stat-row .val{font-family:var(--font-mono);font-size:11px;color:var(--text)}
.activity-feed{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:6px}
.activity-item{font-size:10px;color:var(--text2);line-height:1.5;padding:6px 8px;background:var(--bg3);border-radius:4px;border-left:2px solid var(--border2);animation:fadeIn .4s ease}
.activity-item .flt{color:var(--gold);font-family:var(--font-board)}
.side-yes{color:var(--orange)}.side-no{color:var(--green)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.board-top{display:flex;align-items:center;justify-content:space-between;padding:16px 24px 12px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.board-airport .name{font-size:18px;font-weight:600;letter-spacing:1px}
.board-airport .meta{font-size:11px;color:var(--text2);letter-spacing:1px}
.board-controls{display:flex;align-items:center;gap:10px}
.search-box{background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--font-board);font-size:12px;padding:7px 12px;width:180px;letter-spacing:1px;outline:none}
.search-box:focus{border-color:var(--border2)}
.search-box::placeholder{color:var(--text3)}
.sort-btn{background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text2);font-size:10px;padding:7px 12px;cursor:pointer;letter-spacing:1px;transition:all .15s;font-family:var(--font-ui)}
.sort-btn:hover{border-color:var(--border2);color:var(--text)}
.sort-btn.active{border-color:var(--gold2);color:var(--gold)}
.table-header{display:grid;grid-template-columns:100px 1fr 90px 110px 120px 150px;padding:8px 24px;background:var(--bg3);border-bottom:1px solid var(--border);font-size:9px;letter-spacing:2px;color:var(--text3);flex-shrink:0}
.flight-list{flex:1;overflow-y:auto}
.flight-row{display:grid;grid-template-columns:100px 1fr 90px 110px 120px 150px;padding:0 24px;min-height:58px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;align-items:center}
.flight-row:hover{background:var(--bg3)}
.flight-row.selected{background:rgba(138,111,0,.06);border-left:3px solid var(--gold);padding-left:21px}
.flight-row.has-pos{background:rgba(30,122,66,.04)}
.cell-fid{font-family:var(--font-board);font-size:13px;color:var(--gold);letter-spacing:1px}
.cell-al{font-size:9px;color:var(--text3);margin-top:2px;letter-spacing:1px}
.cell-dest .code{font-family:var(--font-board);font-size:17px;color:var(--text);letter-spacing:2px}
.cell-dest .city{font-size:10px;color:var(--text3);letter-spacing:.5px}
.cell-time{font-family:var(--font-board);font-size:16px;color:var(--text);letter-spacing:1px}
.cell-gate{font-family:var(--font-mono);font-size:11px;color:var(--text2)}
.st-OnTime,.st-ontime{font-size:10px;color:var(--green);letter-spacing:1px}
.st-Delayed,.st-delayed{font-size:10px;color:var(--red);letter-spacing:1px}
.st-Boarding,.st-boarding{font-size:10px;color:var(--blue);letter-spacing:1px}
.st-Cancelled,.st-cancelled,.st-Departed,.st-departed{font-size:10px;color:var(--text3);letter-spacing:1px}
.cell-odds{display:flex;flex-direction:column;gap:4px}
.odds-nums{display:flex;gap:8px;align-items:baseline}
.odds-yes{font-family:var(--font-board);font-size:14px;color:var(--orange)}
.odds-no{font-family:var(--font-board);font-size:14px;color:var(--green)}
.odds-sep{font-size:10px;color:var(--text3)}
.odds-bar{width:100%;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden}
.odds-fill{height:100%;background:var(--orange);border-radius:2px;transition:width .6s ease}
.vol-tag{font-size:9px;color:var(--text3);font-family:var(--font-mono)}
.cell-actions{display:flex;gap:5px;align-items:center}
.q-btn{font-size:10px;font-weight:600;letter-spacing:1px;padding:5px 12px;border-radius:4px;cursor:pointer;border:1px solid;transition:all .15s;font-family:var(--font-ui)}
.q-yes{border-color:var(--orange);color:var(--orange);background:transparent}
.q-yes:hover{background:var(--orange);color:#080808}
.q-no{border-color:var(--green);color:var(--green);background:transparent}
.q-no:hover{background:var(--green);color:#080808}
.pos-badge{font-size:9px;padding:2px 6px;border-radius:3px;letter-spacing:1px;font-family:var(--font-mono)}
.pos-yes-badge{background:rgba(232,130,74,.12);color:var(--orange);border:1px solid rgba(232,130,74,.3)}
.pos-no-badge{background:rgba(93,186,126,.12);color:var(--green);border:1px solid rgba(93,186,126,.3)}
.detail-panel{border-top:1px solid var(--border);background:var(--bg3);flex-shrink:0;max-height:0;overflow:hidden;transition:max-height .35s ease}
.detail-panel.open{max-height:420px}
.detail-inner{padding:20px 24px;display:grid;grid-template-columns:1fr 280px;gap:24px}
.detail-title{font-size:11px;color:var(--text3);letter-spacing:2px;margin-bottom:14px}
.detail-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.d-stat{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:12px}
.d-stat .lbl{font-size:9px;color:var(--text3);letter-spacing:2px;margin-bottom:5px}
.d-stat .val{font-size:22px;font-family:var(--font-board);color:var(--gold)}
.d-stat .sub{font-size:9px;color:var(--text3);margin-top:2px}
.prob-visual{height:8px;background:var(--bg4);border-radius:4px;overflow:hidden;margin-bottom:16px;display:flex}
.prob-yes-fill{background:var(--orange);height:100%;transition:width .6s ease}
.prob-no-fill{background:var(--green);height:100%;transition:width .6s ease}
.prob-labels{display:flex;justify-content:space-between;font-size:10px;margin-bottom:12px}
.prob-labels .yl{color:var(--orange)}.prob-labels .nl{color:var(--green)}
.flight-info-row{display:flex;gap:20px;font-size:11px;color:var(--text2);flex-wrap:wrap}
.flight-info-row .lbl{color:var(--text3)}
.detail-right{border-left:1px solid var(--border);padding-left:20px}
.bet-title{font-size:10px;color:var(--text3);letter-spacing:2px;margin-bottom:14px}
.side-toggle{display:flex;margin-bottom:14px;border:1px solid var(--border);border-radius:5px;overflow:hidden}
.side-btn{flex:1;padding:9px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;letter-spacing:1px;transition:all .15s;font-family:var(--font-ui);border:none;background:transparent;color:var(--text2)}
.side-btn.active-yes{background:rgba(196,86,26,.12);color:var(--orange)}
.side-btn.active-no{background:rgba(30,122,66,.12);color:var(--green)}
.bet-row{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.bet-label{font-size:10px;color:var(--text3);letter-spacing:1px;width:60px}
.bet-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--font-board);font-size:14px;padding:8px 10px;letter-spacing:1px;outline:none}
.bet-input:focus{border-color:var(--border2)}
.preset-btns{display:flex;gap:4px;margin-bottom:12px}
.preset-btn{flex:1;padding:5px;background:var(--bg2);border:1px solid var(--border);color:var(--text2);font-size:10px;cursor:pointer;border-radius:4px;transition:all .15s;font-family:var(--font-mono)}
.preset-btn:hover{border-color:var(--border2);color:var(--text)}
.payout-box{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:10px 12px;margin-bottom:12px}
.payout-row{display:flex;justify-content:space-between;font-size:11px;padding:2px 0}
.payout-row .pl{color:var(--text2)}.payout-row .pr{font-family:var(--font-mono);color:var(--text)}
.payout-row.win .pr{color:var(--green)}
.place-btn{width:100%;padding:11px;background:var(--gold);border:none;border-radius:5px;color:#080808;font-family:var(--font-ui);font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:background .15s}
.place-btn:hover{background:var(--gold2)}
.place-btn:disabled{background:var(--bg4);color:var(--text3);cursor:not-allowed}
.portfolio-view{flex:1;overflow-y:auto;padding:24px}
.port-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.port-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:16px;display:flex;flex-direction:column;gap:4px}
.port-card .pc-label{font-size:9px;color:var(--text3);letter-spacing:2px}
.port-card .pc-val{font-family:var(--font-board);font-size:26px;color:var(--gold)}
.port-card .pc-sub{font-size:10px;color:var(--text3)}
.port-card.green .pc-val{color:var(--green)}.port-card.red .pc-val{color:var(--red)}
.port-section{margin-bottom:24px}
.port-section-title{font-size:10px;letter-spacing:2px;color:var(--text3);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.position-card{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.pos-left{display:flex;gap:16px;align-items:center}
.pos-fid{font-family:var(--font-board);font-size:16px;color:var(--gold);letter-spacing:2px}
.pos-dest{font-size:13px;color:var(--text2)}
.pos-right{display:flex;gap:20px;align-items:center}
.pos-val-col{display:flex;flex-direction:column;gap:2px}
.pos-val-label{font-size:9px;color:var(--text3);letter-spacing:1px}
.pos-val-num{font-family:var(--font-board);font-size:14px}
.resolved-card{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:12px 16px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;opacity:.8}
.res-win{background:rgba(30,122,66,.1);color:var(--green);border:1px solid rgba(30,122,66,.25);font-size:10px;font-weight:600;padding:3px 10px;border-radius:3px;letter-spacing:1px}
.res-loss{background:rgba(192,57,43,.1);color:var(--red);border:1px solid rgba(192,57,43,.25);font-size:10px;font-weight:600;padding:3px 10px;border-radius:3px;letter-spacing:1px}
.leaderboard-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px}
.lb-rank{font-family:var(--font-board);color:var(--text3);width:24px}
.lb-name{flex:1;padding-left:12px}
.lb-val{font-family:var(--font-mono);color:var(--green)}
.lb-row-me{background:var(--bg3);border-left:2px solid var(--gold)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:32px;width:380px}
.modal-title{font-size:20px;font-weight:600;margin-bottom:4px}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:24px;line-height:1.6}
.modal-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--font-ui);font-size:13px;padding:10px 14px;margin-bottom:10px;outline:none}
.modal-input:focus{border-color:var(--border2)}
.modal-input::placeholder{color:var(--text3)}
.modal-btn{width:100%;padding:12px;background:var(--gold);border:none;border-radius:5px;color:#080808;font-family:var(--font-ui);font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-bottom:12px}
.modal-switch{font-size:11px;color:var(--text2);text-align:center}
.modal-switch a{color:var(--gold);cursor:pointer;text-decoration:none}
.modal-err{color:var(--red);font-size:11px;margin-bottom:8px}
.airport-modal{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:24px;width:480px}
.airport-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px}
.airport-opt{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px;cursor:pointer;transition:all .15s;text-align:center}
.airport-opt:hover,.airport-opt.active{border-color:var(--gold2);background:var(--bg4)}
.airport-opt .ap-code{font-family:var(--font-board);font-size:20px;color:var(--gold);letter-spacing:2px}
.airport-opt .ap-city{font-size:10px;color:var(--text3)}
.toast{position:fixed;bottom:24px;right:24px;background:var(--bg3);border:1px solid var(--border2);border-radius:7px;padding:12px 18px;font-size:12px;color:var(--text);opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:300;max-width:300px;letter-spacing:.5px}
.toast.show{opacity:1;transform:translateY(0)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<nav>
  <div class="nav-logo">FLIGHTBET <span>// DELAY MARKETS</span></div>
  <div class="nav-right">
    <button class="nav-btn outline" id="theme-toggle" onclick="toggleTheme()" style="padding:7px 10px;font-size:13px;letter-spacing:0">☀︎</button>
    <div class="nav-airport" onclick="openAirportPicker()">
      <span class="code" id="nav-code">SFO</span>
      <span id="nav-airport-name">San Francisco Intl</span>
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 4l3 3 3-3" stroke="#8a8680" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
    <div id="auth-area"></div>
  </div>
</nav>
<div class="ticker"><div class="ticker-inner" id="ticker"></div></div>
<div class="main" id="main-area">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Filter</div>
      <div class="filter-chip active" data-filter="all" onclick="setFilter('all')">All Flights <span class="count" id="fc-all">0</span></div>
      <div class="filter-chip" data-filter="active" onclick="setFilter('active')">Active Markets <span class="count" id="fc-active">0</span></div>
      <div class="filter-chip" data-filter="high" onclick="setFilter('high')">High Delay Risk <span class="count" id="fc-high">0</span></div>
      <div class="filter-chip" data-filter="boarding" onclick="setFilter('boarding')">Boarding Now <span class="count" id="fc-boarding">0</span></div>
      <div class="filter-chip" data-filter="departed" onclick="setFilter('departed')">Departed <span class="count" id="fc-departed">0</span></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Market Stats</div>
      <div id="market-stats"></div>
    </div>
    <div class="sidebar-section" style="border-bottom:none;flex-shrink:0"><div class="sidebar-label">Live Activity</div></div>
    <div class="activity-feed" id="activity-feed"></div>
  </div>
  <div class="content" id="board-content">
    <div class="board-top">
      <div class="board-airport">
        <div class="name" id="board-title">San Francisco International</div>
        <div class="meta" id="board-meta">SFO — Departures — <span id="board-time"></span></div>
      </div>
      <div class="board-controls">
        <input class="search-box" placeholder="SEARCH FLIGHT / DEST..." id="search-box" oninput="renderAll()">
        <button class="sort-btn active" data-sort="time" onclick="setSort('time')">TIME</button>
        <button class="sort-btn" data-sort="delay" onclick="setSort('delay')">DELAY %</button>
        <button class="sort-btn" data-sort="volume" onclick="setSort('volume')">VOLUME</button>
      </div>
    </div>
    <div class="table-header">
      <span>FLIGHT</span><span>DESTINATION</span><span>DEPARTS</span><span>STATUS</span><span>DELAY MARKET</span><span>TRADE</span>
    </div>
    <div class="flight-list" id="flight-list"></div>
    <div class="detail-panel" id="detail-panel"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const AIRPORTS={
  SFO:{name:'San Francisco International',city:'San Francisco, CA',lat:37.621,lng:-122.379},
  LAX:{name:'Los Angeles International',city:'Los Angeles, CA',lat:33.943,lng:-118.408},

// ── API ──
const bCache={};const BTTL=3*60*1000;
async function fetchFlights(iata){
  const now=Date.now();
  if(bCache[iata]&&bCache[iata].exp>now)return bCache[iata].data;
  showLoading(true);
  try{
    if(window.location.protocol==='file:')throw new Error('local');
    const r=await fetch('/api/flights?airport='+iata);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    bCache[iata]={data:d,exp:now+BTTL};
    showBadge(d.mock||d.fallback,d.fetchedAt);
    return d;
  }catch(e){
    const d={flights:(MOCK[iata]||MOCK.SFO),iata,fetchedAt:new Date().toISOString(),mock:true};
    bCache[iata]={data:d,exp:now+BTTL};
    showBadge(true,null);
    return d;
  }finally{showLoading(false);}
}
function showLoading(v){const e=document.getElementById('board-title');if(e)e.style.opacity=v?'.5':'1';}
function showBadge(isMock,fetchedAt){
  let b=document.getElementById('data-badge');
  if(!b){b=document.createElement('span');b.id='data-badge';b.style.cssText='font-size:9px;letter-spacing:1.5px;padding:2px 8px;border-radius:3px;font-family:var(--font-mono);margin-left:12px;vertical-align:middle;';document.getElementById('board-title')?.after(b);}
  if(isMock){b.textContent='MOCK DATA';b.style.background='rgba(232,130,74,.15)';b.style.color='var(--orange)';b.style.border='1px solid rgba(232,130,74,.3)';}
  else{const t=fetchedAt?new Date(fetchedAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';b.textContent='LIVE · '+t;b.style.background='rgba(93,186,126,.1)';b.style.color='var(--green)';b.style.border='1px solid rgba(93,186,126,.25)';}
}

// ── GEO ──
function detectAirport(){
  if(!navigator.geolocation){setAirport('SFO');return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    let best='SFO',bd=Infinity;
    Object.entries(AIRPORTS).forEach(([c,a])=>{const d=Math.hypot(lat-a.lat,lng-a.lng);if(d<bd){bd=d;best=c;}});
    setAirport(best);
  },()=>setAirport('SFO'));
}
function setAirport(code){
  ap=code;
  document.getElementById('nav-code').textContent=code;
  document.getElementById('nav-airport-name').textContent=AIRPORTS[code]?.name||code;
  document.getElementById('board-title').textContent=AIRPORTS[code]?.name||code;
  document.getElementById('board-meta').textContent=code+' — Departures — ';
  sel=null;
  const dp=document.getElementById('detail-panel');dp.classList.remove('open');dp.innerHTML='';
  document.getElementById('flight-list').innerHTML='<div style="padding:48px;text-align:center;color:var(--text3);font-size:11px;letter-spacing:2px">LOADING FLIGHTS...</div>';
  fetchFlights(code).then(d=>{
    flights=d.flights||[];
    // ensure delayProb exists on every flight
    flights.forEach(f=>{if(f.delayProb==null)f.delayProb=0.2;if(f.vol==null)f.vol=5000;});
    showBadge(d.mock||d.fallback,d.fetchedAt);
    renderAll();updateCounts();updateStats();
  });
}

function setFilter(f){filter=f;document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.filter===f));renderAll();}

function getVisible(){
  const q=(document.getElementById('search-box')?.value||'').toUpperCase();
  let list=flights.filter(f=>{
    if(!f.id)return false;
    if(q&&!f.id.includes(q)&&!(f.dest||'').includes(q)&&!(f.destName||'').toUpperCase().includes(q))return false;
    if(filter==='active')return f.status!=='Departed'&&f.status!=='Cancelled';
    if(filter==='high')return (f.delayProb||0)>.55;
    if(filter==='boarding')return f.status==='Boarding';
    if(filter==='departed')return f.status==='Departed'||f.status==='Cancelled';
    return true;
  });
  list.sort((a,b)=>sort==='delay'?(b.delayProb||0)-(a.delayProb||0):sort==='volume'?(b.vol||0)-(a.vol||0):(a.time||'').localeCompare(b.time||''));
  return list;
}
function updateCounts(){
  document.getElementById('fc-all').textContent=flights.length;
  document.getElementById('fc-active').textContent=flights.filter(f=>f.status!=='Departed'&&f.status!=='Cancelled').length;
  document.getElementById('fc-high').textContent=flights.filter(f=>(f.delayProb||0)>.55).length;
  document.getElementById('fc-boarding').textContent=flights.filter(f=>f.status==='Boarding').length;
  document.getElementById('fc-departed').textContent=flights.filter(f=>f.status==='Departed'||f.status==='Cancelled').length;
}
function updateStats(){
  const a=flights.filter(f=>f.status!=='Departed'),avg=a.reduce((s,f)=>s+(f.delayProb||0),0)/Math.max(1,a.length),vol=flights.reduce((s,f)=>s+(f.vol||0),0);
  document.getElementById('market-stats').innerHTML='<div class="stat-row"><span class="lbl">Avg Delay Prob</span><span class="val">'+Math.round(avg*100)+'%</span></div><div class="stat-row"><span class="lbl">24h Volume</span><span class="val">$'+(vol/1000).toFixed(0)+'K</span></div><div class="stat-row"><span class="lbl">High Risk</span><span class="val">'+flights.filter(f=>(f.delayProb||0)>.6).length+'</span></div><div class="stat-row"><span class="lbl">Active Markets</span><span class="val">'+a.length+'</span></div>';
}

function placeBet(id){
  if(!user){openAuthModal();return;}
  const amt=parseFloat(document.getElementById('bet-amount')?.value)||0;
  if(amt<=0){showToast('Enter a valid amount','err');return;}
  if(amt>port.balance){showToast('Insufficient balance','err');return;}
  const f=flights.find(x=>x.id===id);if(!f)return;
  port.balance-=amt;
  const prev=port.positions[id];
  port.positions[id]=prev&&prev.side===betSide?{side:betSide,amount:prev.amount+amt,prob:f.delayProb||.2,dest:f.dest,time:f.time,airline:f.airline}:{side:betSide,amount:amt,prob:f.delayProb||.2,dest:f.dest,time:f.time,airline:f.airline};
  savePort();renderAuthArea();renderAll();renderDetail(id);showToast('Bet placed — '+betSide+' $'+amt+' on '+id,'ok');
}

    +'<div class="port-grid"><div class="port-card"><div class="pc-label">BALANCE</div><div class="pc-val">$'+Math.round(port.balance)+'</div><div class="pc-sub">Play money</div></div><div class="port-card"><div class="pc-label">STAKED</div><div class="pc-val">$'+Math.round(staked)+'</div><div class="pc-sub">'+pos.length+' active bets</div></div><div class="port-card '+(won-lost>=0?'green':'red')+'"><div class="pc-label">NET P&L</div><div class="pc-val">'+(won-lost>=0?'+':'')+'$'+Math.round(won-lost)+'</div><div class="pc-sub">'+res.length+' resolved</div></div><div class="port-card"><div class="pc-label">WIN RATE</div><div class="pc-val">'+wr+'%</div><div class="pc-sub">'+res.filter(r=>r.won).length+'W / '+res.filter(r=>!r.won).length+'L</div></div></div>'
    +'<div class="port-section"><div class="port-section-title">ACTIVE POSITIONS ('+pos.length+')</div>'
    +(pos.length?pos.map(([id,p])=>{const f=flights.find(x=>x.id===id),cur=f?Math.round((f.delayProb||.2)*100):Math.round((p.prob||.2)*100),mv=p.side==='YES'?(p.amount/(p.prob||.2))*((f?.delayProb||p.prob||.2)):(p.amount/(1-(p.prob||.2)))*((1-(f?.delayProb||p.prob||.2))),pnl=mv-p.amount;return'<div class="position-card"><div class="pos-left"><div class="pos-fid">'+id+'</div><div><div class="pos-dest">'+p.dest+' · '+(p.airline||'')+'</div><div style="font-size:10px;color:var(--text3);margin-top:2px">'+(p.time||'')+' · Current: '+cur+'%</div></div></div><div class="pos-right"><div class="pos-val-col"><div class="pos-val-label">SIDE</div><span class="pos-badge '+(p.side==='YES'?'pos-yes-badge':'pos-no-badge')+'">'+p.side+'</span></div><div class="pos-val-col"><div class="pos-val-label">STAKED</div><div class="pos-val-num">$'+p.amount.toFixed(0)+'</div></div><div class="pos-val-col"><div class="pos-val-label">MKT VALUE</div><div class="pos-val-num" style="color:'+(pnl>=0?'var(--green)':'var(--red)')+'">$'+mv.toFixed(0)+'</div></div><div class="pos-val-col"><div class="pos-val-label">P&L</div><div class="pos-val-num" style="color:'+(pnl>=0?'var(--green)':'var(--red)')+'">'+(pnl>=0?'+':'')+'$'+pnl.toFixed(0)+'</div></div><button class="q-btn q-no" style="font-size:9px;padding:4px 8px" onclick="resolvePos(\''+id+'\','+(Math.random()>.5)+')">RESOLVE</button></div></div>';}).join('')
    :'<div style="color:var(--text3);font-size:12px;padding:20px 0;letter-spacing:1px">No active positions. Go place some bets!</div>')
    +'</div>'
    +(res.length?'<div class="port-section"><div class="port-section-title">RESOLVED MARKETS ('+res.length+')</div>'+res.slice().reverse().slice(0,10).map(r=>'<div class="resolved-card"><div class="pos-left"><div class="pos-fid" style="font-size:13px">'+r.id+'</div><div><div class="pos-dest">'+r.dest+'</div><div style="font-size:10px;color:var(--text3)">'+r.side+' · Staked $'+r.staked+'</div></div></div><div style="display:flex;align-items:center;gap:16px"><span class="'+(r.won?'res-win':'res-loss')+'">'+(r.won?'WON':'LOST')+'</span><div style="font-family:var(--font-board);font-size:14px;color:'+(r.won?'var(--green)':'var(--red)')+'\">'+(r.won?'+$'+(r.payout-r.staked).toFixed(0):'-$'+r.staked)+'</div></div></div>').join('')+'</div>':'')

}
function resolvePos(id,won){
  const p=port.positions[id];if(!p)return;
  const prob=p.side==='YES'?(p.prob||.2):(1-(p.prob||.2)),payout=won?p.amount/prob:0;
  if(won)port.balance+=payout;
  port.resolved.push({id,dest:p.dest,side:p.side,staked:p.amount,won,payout});
  delete port.positions[id];savePort();
  showToast(won?'WON! +$'+(payout-p.amount).toFixed(0)+' on '+id:'Lost $'+p.amount+' on '+id,won?'ok':'err');
  renderPortfolio();renderAuthArea();
}

// ── AUTH ──
function renderAuthArea(){
  const a=document.getElementById('auth-area');
  a.innerHTML=user
    ?'<div class="user-pill" onclick="showPortfolio()"><div class="avatar">'+user.name.substring(0,2).toUpperCase()+'</div><span>'+user.name+'</span><span class="bal">$'+Math.round(port.balance)+'</span></div><button class="nav-btn outline" onclick="logout()">LOGOUT</button>'
    :'<button class="nav-btn outline" onclick="openAuthModal(\'login\')">LOG IN</button><button class="nav-btn primary" onclick="openAuthModal(\'signup\')">SIGN UP FREE</button>';
}
function openAuthModal(mode='signup'){
  const o=document.createElement('div');o.className='modal-overlay';o.id='auth-overlay';o.onclick=e=>{if(e.target===o)closeModal();};
  o.innerHTML='<div class="modal"><div class="modal-title">'+(mode==='login'?'Welcome back':'Start betting free')+'</div><div class="modal-sub">'+(mode==='login'?'Log in to see your positions.':'Create a free account. Start with $1,000 in play money.')+'</div><div class="modal-err" id="modal-err" style="display:none"></div>'+(mode==='signup'?'<input class="modal-input" id="m-name" placeholder="Display name" autocomplete="off">':'')+'<input class="modal-input" id="m-email" placeholder="Email address" type="email" autocomplete="off"><input class="modal-input" id="m-pass" placeholder="Password" type="password"><button class="modal-btn" onclick="submitAuth(\''+mode+'\')">'+(mode==='login'?'LOG IN':'CREATE ACCOUNT')+'</button><div class="modal-switch">'+(mode==='login'?'No account? <a onclick="switchModal(\'signup\')">Sign up free →</a>':'Already have one? <a onclick="switchModal(\'login\')">Log in →</a>')+'</div></div>';
  document.body.appendChild(o);setTimeout(()=>o.querySelector('.modal-input')?.focus(),50);
}
function switchModal(m){closeModal();openAuthModal(m);}
function closeModal(){const o=document.getElementById('auth-overlay');if(o)o.remove();}
function submitAuth(mode){
  const email=(document.getElementById('m-email')?.value||'').trim(),pass=(document.getElementById('m-pass')?.value||'').trim(),name=(document.getElementById('m-name')?.value||'').trim();
  const err=msg=>{const e=document.getElementById('modal-err');if(e){e.textContent=msg;e.style.display='block';}};
  if(!email||!pass){err('Email and password required');return;}
  const users=getUsers();
  if(mode==='signup'){
    if(!name){err('Display name required');return;}
    if(users.find(u=>u.email===email)){err('Email already registered');return;}
    users.push({email,pass,name});saveUsers(users);user={email,pass,name};
  }else{
    const f=users.find(u=>u.email===email&&u.pass===pass);
    if(!f){err('Invalid email or password');return;}
    user=f;
  }
  loadPort();closeModal();renderAuthArea();showToast('Welcome'+(mode==='signup'?' — you have $1,000!':' back')+', '+user.name,'ok');
}
function logout(){user=null;port={balance:1000,positions:{},resolved:[]};if(view==='portfolio')showBoard();renderAuthArea();showToast('Logged out','ok');}

}
