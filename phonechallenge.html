<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blueberry Challenge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 100px;
      max-width: 1200px;
    }

    /* Blueberry shape text container */
    .blueberry-container {
      position: relative;
      width: 600px;
      height: 600px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .blueberry-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 45% 55% 52% 48% / 48% 45% 55% 52%;
      background: linear-gradient(135deg, #0066ff 0%, #0052cc 50%, #003d99 100%);
      box-shadow: 0 0 150px rgba(0, 102, 255, 0.4), 0 0 300px rgba(0, 102, 255, 0.15), inset 0 0 80px rgba(255, 255, 255, 0.1);
      z-index: 1;
    }

    .blueberry-center {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .center-emoji {
      font-size: 90px;
      filter: drop-shadow(0 4px 25px rgba(0, 0, 0, 0.3));
    }

    .text-wrapper {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 50px;
    }

    .text-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      max-width: 420px;
    }

    .text-line {
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.5px;
      line-height: 1.5;
    }

    .text-line.small {
      font-size: 13px;
      opacity: 0.95;
      font-weight: 500;
    }

    .text-line.highlight {
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    /* Buttons section */
    .button-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      z-index: 10;
    }

    .btn {
      padding: 16px 56px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      letter-spacing: 0.3px;
      box-shadow: 0 8px 24px rgba(0, 102, 255, 0.25);
    }

    .btn-start {
      background: linear-gradient(135deg, #0066ff 0%, #0052cc 100%);
      color: white;
      min-width: 240px;
    }

    .btn-start:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0, 102, 255, 0.4);
    }

    .btn-start:active {
      transform: translateY(-1px);
    }

    .btn-website {
      background: transparent;
      color: #0066ff;
      border: 2px solid #0066ff;
      box-shadow: 0 0 30px rgba(0, 102, 255, 0.2);
      min-width: 240px;
    }

    .btn-website:hover {
      background: rgba(0, 102, 255, 0.08);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0, 102, 255, 0.3);
      border-color: #0066ff;
    }

    .btn-website:active {
      transform: translateY(-1px);
    }

    @media (max-width: 768px) {
      .blueberry-container {
        width: 420px;
        height: 420px;
      }

      .text-line {
        font-size: 12px;
      }

      .text-line.highlight {
        font-size: 14px;
      }

      .center-emoji {
        font-size: 60px;
      }

      .btn {
        padding: 15px 40px;
        font-size: 14px;
        min-width: 180px;
      }

      .button-container {
        gap: 12px;
        flex-direction: column;
        width: 100%;
      }

      .btn {
        width: 100%;
      }
    }

    @media (max-width: 480px) {
      .blueberry-container {
        width: 320px;
        height: 320px;
      }

      .text-line {
        font-size: 11px;
      }

      .text-line.highlight {
        font-size: 12px;
      }

      .center-emoji {
        font-size: 48px;
      }

      .text-wrapper {
        padding: 30px;
      }

      .container {
        gap: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Blueberry Shape Container -->
    <div class="blueberry-container">
      <div class="blueberry-bg"></div>
      <div class="blueberry-center">
        <div class="center-emoji">🫐</div>
      </div>
      
      <div class="text-wrapper">
        <div class="text-content">
          <div class="text-line highlight">BLUEBERRY</div>
          
          <div class="text-line">5 Minutes</div>
          <div class="text-line small">to process incoming</div>
          <div class="text-line small">customer interactions</div>
          
          <div class="text-line">Find High-Intent</div>
          <div class="text-line small">customers & DM them</div>
          
          <div class="text-line">Convert to Sales</div>
          <div class="text-line small">Hide negatives</div>
          <div class="text-line small">Build community</div>
          
          <div class="text-line" style="margin-top: 12px;">vs Blueberry AI</div>
          <div class="text-line small">See your score</div>
          <div class="text-line small">Track revenue impact</div>
        </div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="button-container">
      <button class="btn btn-start" onclick="startChallenge()">Start Challenge</button>
      <a href="https://blueberrysocial.com" class="btn btn-website" target="_blank">blueberrysocial.com</a>
    </div>
  </div>

  <script>
    function startChallenge() {
      window.location.href = 'game_challenge_blueberry_final.html';
    }
  </script>
</body>
</html>
