<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>O Relationship Status Tracker</title>
  <link rel="stylesheet" href="/o-relationship-tracker/styles.css">
</head>
<body>
  <main>
    <header>
      <h1>O Relationship Status Tracker</h1>
      <p>current official status of O, as determined by the committee</p>
    </header>

    <section class="grid">

      <div class="card">
        <h2>orientation</h2>
        <div class="circle split">
          <span class="label left">gay</span>
          <span class="label right">straight</span>
          <div class="midline"></div>
          <div class="arrow gay">➤<span>O</span></div>
        </div>
      </div>

      <div class="card">
        <h2>legally</h2>
        <div class="circle split">
          <span class="label left">married</span>
          <span class="label right">divorced</span>
          <div class="midline"></div>
          <div class="arrow legally-married">➤<span>O</span></div>
        </div>
      </div>

      <div class="card">
        <h2>spiritually</h2>
        <div class="circle split">
          <span class="label left">married</span>
          <span class="label right">divorced</span>
          <div class="midline"></div>
          <div class="arrow spiritually-divorced">➤<span>O</span></div>
        </div>
      </div>

      <div class="card">
        <h2>availability</h2>
        <div class="circle split">
          <span class="label left">single</span>
          <span class="label right">taken</span>
          <div class="midline"></div>
          <div class="arrow single">➤<span>O</span></div>
        </div>
      </div>

      <div class="card partners-card">
        <h2>partners currently</h2>
        <div class="circle partners">
          <div class="spoke s0"></div>
          <div class="spoke s1"></div>
          <div class="spoke s2"></div>
          <div class="spoke s3"></div>
          <div class="spoke s4"></div>
          <div class="spoke s5"></div>

          <span class="num n0">0</span>
          <span class="num n1">1</span>
          <span class="num n2">2</span>
          <span class="num n3">3</span>
          <span class="num n4">4</span>
          <span class="num n5">5</span>

          <div class="arrow partners-two">➤<span>O</span></div>
        </div>
      </div>

    </section>
  </main>
</body>
</html>
